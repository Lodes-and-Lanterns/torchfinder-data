desc: >
  An adventure anthology featuring various locales for levels 1–5, including over fifteen wilderness and six urban encounters featuring grifters, cave trolls, and wine. Will you peer into a magical reflecting pool? Would you open Shune's Door? Should the tomb of an ancient elf-lord be pilfered for its riches? Can you rescue Lord Oster's fiancée from her captors? The answers to these questions will challenge and thrill the party.
